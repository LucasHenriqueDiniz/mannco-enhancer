<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Changelog - Mannco Enhancer</title>
    <style>
      :root {
        --bg: #0d1b2e;
        --card: #142236;
        --text: #c8dff0;
        --muted: #5a7a96;
        --accent: #5ab4ff;
        --border: #1e3a5a;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 24px;
        color: var(--accent);
        border-bottom: 2px solid var(--border);
        padding-bottom: 10px;
      }
      h2 {
        margin: 28px 0 12px;
        font-size: 18px;
        color: var(--accent);
      }
      h3 {
        margin: 18px 0 8px;
        font-size: 14px;
        color: #8aabcc;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      ul { margin: 0 0 12px; padding-left: 20px; }
      li { margin: 6px 0; }
      strong { color: var(--accent); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      code {
        background: var(--card);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: #f5a050;
      }
      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 20px 0;
      }
      .me-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 0;
        margin-bottom: 10px;
        border-bottom: 2px solid var(--border);
      }
      .me-header-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .me-header-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .me-header-text {
        flex: 1;
      }
      .me-header-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: var(--accent);
      }
      .me-header-sub {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }
      .me-header-links {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .me-header-links a {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px;
        border-radius: 6px;
        background: var(--card);
        border: 1px solid var(--border);
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        text-decoration: none;
        transition: all .15s ease;
      }
      .me-header-links a:hover {
        background: #1a3050;
        border-color: #2a6aaa;
      }
      .me-header-links a svg {
        fill: currentColor;
      }
      #error {
        color: #f28482;
        padding: 16px;
        background: #2a1515;
        border-radius: 6px;
        border: 1px solid #5a2020;
      }
    </style>
  </head>
  <body>
    <div class="me-header">
      <div class="me-header-icon">
        <img src="assets/icons/icon32.png" alt="Mannco Enhancer" />
      </div>
      <div class="me-header-text">
        <p class="me-header-title">Mannco Enhancer</p>
        <p class="me-header-sub">Upgrade your marketplace experience</p>
      </div>
      <div class="me-header-links">
        <a href="https://lucashdo.com/donate" target="_blank" rel="noopener noreferrer">
          <svg width="12" height="12" viewBox="0 0 16 16"><path d="M4 1c2.21 0 4 1.755 4 3.92C8 2.755 9.79 1 12 1s4 1.755 4 3.92c0 3.263-3.234 4.414-7.608 9.608a.513.513 0 0 1-.784 0C3.234 9.334 0 8.183 0 4.92 0 2.755 1.79 1 4 1z"/></svg>
          Donate
        </a>
        <a href="https://github.com/LucasHenriqueDiniz/mannco-enhancer" target="_blank" rel="noopener noreferrer">
          <svg width="12" height="12" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>
    </div>

    <h1>Changelog</h1>
    <div id="content"><p style="color: var(--muted); font-style: italic;">Loading changelog...</p></div>

    <script>
      // Ultra-lightweight markdown parser for our changelog format
      function parseMarkdown(md) {
        return md
          .replace(/^#### (.*$)/gm, '<h4>$1</h4>')
          .replace(/^### (.*$)/gm, '<h3>$1</h3>')
          .replace(/^## (.*$)/gm, '<h2>$1</h2>')
          .replace(/^# (.*$)/gm, '<h1>$1</h1>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/^- (.*$)/gm, '<li>$1</li>')
          .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
          .replace(/\n{2,}/g, '\n\n')
          .trim();
      }

      (async () => {
        const container = document.getElementById('content');
        try {
          const mdUrl = new URL('CHANGE_LOG.md', window.location.href).href;
          const response = await fetch(mdUrl);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status} - ${response.statusText}`);
          }

          const md = await response.text();
          container.innerHTML = parseMarkdown(md);
        } catch (err) {
          console.error('[Changelog] Failed to load:', err);
          container.innerHTML = `<div id="error">
            <strong>Failed to load changelog</strong><br/>
            ${err.message}<br/><br/>
            <span style="color: var(--muted); font-size: 12px;">
              Make sure CHANGE_LOG.md exists in the extension root directory.
            </span>
          </div>`;
        }
      })();
    </script>
  </body>
</html>
