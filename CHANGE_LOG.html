<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Changelog - Mannco Enhancer</title>
    <style>
      :root {
        --bg: #0d1b2e;
        --card: #142236;
        --text: #c8dff0;
        --muted: #5a7a96;
        --accent: #5ab4ff;
        --border: #1e3a5a;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 24px;
        color: var(--accent);
        border-bottom: 2px solid var(--border);
        padding-bottom: 10px;
      }
      h2 {
        margin: 28px 0 12px;
        font-size: 18px;
        color: var(--accent);
      }
      h3 {
        margin: 18px 0 8px;
        font-size: 14px;
        color: #8aabcc;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      ul { margin: 0 0 12px; padding-left: 20px; }
      li { margin: 6px 0; }
      strong { color: var(--accent); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      code {
        background: var(--card);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: #f5a050;
      }
      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 20px 0;
      }
      #error {
        color: #f28482;
        padding: 16px;
        background: #2a1515;
        border-radius: 6px;
        border: 1px solid #5a2020;
      }
    </style>
  </head>
  <body>
    <h1>Changelog</h1>
    <div id="content"><p style="color: var(--muted); font-style: italic;">Loading changelog...</p></div>

    <script>
      // Ultra-lightweight markdown parser for our changelog format
      function parseMarkdown(md) {
        return md
          .replace(/^#### (.*$)/gm, '<h4>$1</h4>')
          .replace(/^### (.*$)/gm, '<h3>$1</h3>')
          .replace(/^## (.*$)/gm, '<h2>$1</h2>')
          .replace(/^# (.*$)/gm, '<h1>$1</h1>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/^- (.*$)/gm, '<li>$1</li>')
          .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
          .replace(/\n{2,}/g, '\n\n')
          .trim();
      }

      (async () => {
        const container = document.getElementById('content');
        try {
          const mdUrl = new URL('CHANGE_LOG.md', window.location.href).href;
          const response = await fetch(mdUrl);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status} - ${response.statusText}`);
          }

          const md = await response.text();
          container.innerHTML = parseMarkdown(md);
        } catch (err) {
          console.error('[Changelog] Failed to load:', err);
          container.innerHTML = `<div id="error">
            <strong>Failed to load changelog</strong><br/>
            ${err.message}<br/><br/>
            <span style="color: var(--muted); font-size: 12px;">
              Make sure CHANGE_LOG.md exists in the extension root directory.
            </span>
          </div>`;
        }
      })();
    </script>
  </body>
</html>
