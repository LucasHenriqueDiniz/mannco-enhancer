<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Changelog - Mannco Enhancer</title>
    <style>
      :root {
        --bg: #0d1b2e;
        --card: #142236;
        --text: #c8dff0;
        --muted: #5a7a96;
        --accent: #5ab4ff;
        --border: #1e3a5a;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 24px;
        color: var(--accent);
        border-bottom: 2px solid var(--border);
        padding-bottom: 10px;
      }
      h2 {
        margin: 28px 0 12px;
        font-size: 18px;
        color: var(--accent);
      }
      h3 {
        margin: 18px 0 8px;
        font-size: 14px;
        color: #8aabcc;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      ul { margin: 0 0 12px; padding-left: 20px; }
      li { margin: 6px 0; }
      strong { color: var(--accent); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      code {
        background: var(--card);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: #f5a050;
      }
      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 20px 0;
      }
      blockquote {
        margin: 12px 0;
        padding: 10px 16px;
        border-left: 3px solid var(--accent);
        background: var(--card);
        border-radius: 0 6px 6px 0;
      }
      #loading {
        color: var(--muted);
        font-style: italic;
      }
      #error {
        color: #f28482;
        padding: 16px;
        background: #2a1515;
        border-radius: 6px;
        border: 1px solid #5a2020;
      }
    </style>
  </head>
  <body>
    <h1>Changelog</h1>
    <div id="content"><p id="loading">Loading changelog...</p></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      (async () => {
        const container = document.getElementById('content');
        try {
          const response = await fetch('CHANGE_LOG.md');
          if (!response.ok) throw new Error('Failed to load CHANGE_LOG.md');
          const md = await response.text();
          container.innerHTML = marked.parse(md);
        } catch (err) {
          container.innerHTML = `<div id="error">Error loading changelog: ${err.message}</div>`;
        }
      })();
    </script>
  </body>
</html>
